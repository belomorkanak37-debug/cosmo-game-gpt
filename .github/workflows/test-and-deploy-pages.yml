name: Deploy game preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check files
        run: |
          test -f index.html
          test -f js/playable.js
          test -f assets/asteroid_normal.svg
          test -f assets/asteroid_crystal.svg
          test -f assets/asteroid_gold.svg
          test -f assets/asteroid_legendary.svg
          grep -q "js/playable.js" index.html
          node --check js/playable.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
