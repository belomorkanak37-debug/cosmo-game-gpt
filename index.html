<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#05081c">
  <title>Звёздный Старатель</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #05081c;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: Arial, Helvetica, sans-serif;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #05081c;
      touch-action: none;
    }
    #fallbackMessage {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      color: rgba(255,255,255,.72);
      font: 12px/1.4 Arial, sans-serif;
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" aria-label="Звёздный Старатель"></canvas>
  <div id="fallbackMessage">Загрузка игры...</div>

  <script src="https://yandex.ru/games/sdk/v2"></script>
  <script src="js/playable.js?v=20260624-02"></script>
</body>
</html>
